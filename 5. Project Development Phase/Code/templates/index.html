<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Approval Form</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>

<nav>

    <div class="logo">
        <i class="fa-solid fa-credit-card"></i>
        CreditAI
    </div>

    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/prediction">Prediction</a></li>
    </ul>

</nav>

<div class="container">

<div class="title">

<h1>Credit Card Approval Prediction</h1>

<p>

Complete the application below to predict whether the customer is eligible for a credit card.

</p>

</div>

<div class="progress-bar">

<div class="progress-fill"></div>

</div>

<form action="/predict" method="POST">

<!-- Applicant Information -->

<div class="section">

<h2><i class="fa-solid fa-user"></i> Applicant Information</h2>

<div class="grid">

<div class="input-box">
<label>Applicant Name</label>
<input type="text" name="applicant_name" placeholder="Enter Name">
</div>

<div class="input-box">
<label>Age</label>
<input type="number" name="age" required>
</div>

<div class="input-box">
<label>Gender</label>
<select name="gender">

<option value="M">Male</option>

<option value="F">Female</option>

</select>
</div>

<div class="input-box">

<label>Education</label>

<select name="education">

{% for opt in education_levels %}

<option value="{{opt}}">{{opt}}</option>

{% endfor %}

</select>

</div>

<div class="input-box">

<label>Family Status</label>

<select name="family_status">

{% for opt in family_statuses %}

<option value="{{opt}}">{{opt}}</option>

{% endfor %}

</select>

</div>

<div class="input-box">

<label>Children</label>

<input type="number" name="children" value="0">

</div>

<div class="input-box">

<label>Family Size</label>

<input type="number" name="family_size" value="1">

</div>

</div>

</div>

<!-- Income -->

<div class="section">

<h2><i class="fa-solid fa-money-bill-wave"></i> Income Information</h2>

<div class="grid">

<div class="input-box">

<label>Annual Income</label>

<input type="number" name="income" required min="0" max="562500" placeholder="27000">

</div>

<div class="input-box">

<label>Income Type</label>

<select name="income_type">

{% for opt in income_types %}

<option value="{{opt}}">{{opt}}</option>

{% endfor %}

</select>

</div>

<div class="input-box">

<label>Employment Status</label>

<select name="currently_employed">

<option value="Y">Employed</option>

<option value="N">Not Employed</option>

</select>

</div>

<div class="input-box">

<label>Years Employed</label>

<input type="number" step="0.1" name="years_employed">

</div>

<div class="input-box">

<label>Occupation</label>

<select name="occupation">

{% for opt in occupations %}

<option value="{{opt}}">{{opt}}</option>

{% endfor %}

</select>

</div>

</div>

</div>

<!-- Assets -->

<div class="section">

<h2><i class="fa-solid fa-house"></i> Housing & Assets</h2>

<div class="grid">

<div class="input-box">

<label>Housing Type</label>

<select name="housing_type">

{% for opt in housing_types %}

<option value="{{opt}}">{{opt}}</option>

{% endfor %}

</select>

</div>

<div class="input-box">

<label>Own Car</label>

<select name="own_car">

<option value="Y">Yes</option>

<option value="N">No</option>

</select>

</div>

<div class="input-box">

<label>Own Property</label>

<select name="own_realty">

<option value="Y">Yes</option>

<option value="N">No</option>

</select>

</div>

</div>

</div>

<!-- Contact -->

<div class="section">

<h2><i class="fa-solid fa-phone"></i> Contact Details</h2>

<div class="grid">

<div class="input-box">

<label>Work Phone</label>

<select name="work_phone">

<option value="Y">Yes</option>

<option value="N">No</option>

</select>

</div>

<div class="input-box">

<label>Phone</label>

<select name="phone">

<option value="Y">Yes</option>

<option value="N">No</option>

</select>

</div>

<div class="input-box">

<label>Email</label>

<select name="email">

<option value="Y">Yes</option>

<option value="N">No</option>

</select>

</div>

</div>

</div>

<div class="submit-area">

<button type="submit">

<i class="fa-solid fa-chart-column"></i>

Predict Approval

</button>

</div>

</form>

</div>

</body>
</html>
